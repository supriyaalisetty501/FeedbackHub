<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeedbackHub || Alisetty Supriya</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
      <marquee><h1>FeedbackHub</h1></marquee>

    <div class="container" id="feedbackContainer">

        <h1>We Value Your Feedback 💙</h1>
        <p>Help us improve our services by sharing your experience.</p>

        <!-- Star Rating -->
        <div class="rating-section">
            <h3>Rate Us</h3>
            <div class="stars">
                <span class="star" data-value="1">★</span>
                <span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span>
                <span class="star" data-value="4">★</span>
                <span class="star" data-value="5">★</span>
            </div>
        </div>

        <!-- Name -->
        <input type="text" id="name" placeholder="Enter your name">

        <!-- Email -->
        <input type="email" id="email" placeholder="Enter your email">

        <!-- Feedback -->
        <textarea id="feedback" placeholder="Write your feedback..."></textarea>

        <!-- Character Count -->
        <div class="char-count">
            <span id="count">0</span>/200 characters
        </div>

        <button id="submitBtn">Submit Feedback</button>
    </div>
<marquee><p>© 2026 FeedbackHub. All rights reserved.</p></marquee>
<marquee>Designed By Alisetty Supriya</marquee>

    <script src="script.js"></script>
</body>
</html>
